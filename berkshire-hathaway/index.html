<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berkshire Hathaway HomeServices | Heritage Prestige Real Estate</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#003366;
  --cream:#F5F0E8;
  --gold:#B8860B;
  --dark:#1a1a1a;
  --white:#fff;
  --navy-dark:#001a33;
}
html{scroll-behavior:smooth}
body{
  font-family:'Lato',sans-serif;
  color:var(--dark);
  line-height:1.6;
  overflow-x:hidden;
  background:var(--cream);
}
h1,h2,h3,h4,h5,h6{
  font-family:'Playfair Display',serif;
  font-weight:700;
  line-height:1.2;
}
a{text-decoration:none;color:inherit}
img{max-width:100%;display:block}

/* FLOATING GEOMETRIC SHAPES */
.geo-shape{
  position:absolute;
  pointer-events:none;
  opacity:0.07;
  z-index:0;
}
.geo-diamond{
  width:80px;height:80px;
  border:3px solid var(--gold);
  transform:rotate(45deg);
  animation:geoFloat 6s ease-in-out infinite;
}
.geo-circle{
  width:120px;height:120px;
  border:3px solid var(--gold);
  border-radius:50%;
  animation:geoFloat 8s ease-in-out infinite reverse;
}
.geo-triangle{
  width:0;height:0;
  border-left:50px solid transparent;
  border-right:50px solid transparent;
  border-bottom:86px solid rgba(184,134,11,0.15);
  animation:geoFloat 7s ease-in-out infinite;
}
@keyframes geoFloat{
  0%,100%{transform:translateY(0) rotate(0deg)}
  50%{transform:translateY(-30px) rotate(10deg)}
}

/* NAVIGATION */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:rgba(0,51,102,0.97);
  border-bottom:3px solid var(--gold);
  padding:15px 0;
  transition:all 0.3s ease;
}
.nav.scrolled{padding:8px 0;background:rgba(0,26,51,0.98)}
.nav-inner{
  max-width:1200px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;
}
.nav-logo{
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:700;color:var(--white);
  letter-spacing:1px;line-height:1.2;
}
.nav-logo span{display:block;font-size:9px;letter-spacing:3px;font-weight:400;color:var(--gold);margin-top:2px}
.nav-links{display:flex;list-style:none;gap:30px}
.nav-links a{
  color:var(--white);font-size:12px;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;
  position:relative;padding:5px 0;transition:color 0.3s;
}
.nav-links a::after{
  content:'';position:absolute;bottom:0;left:0;
  width:0;height:2px;background:var(--gold);transition:width 0.3s;
}
.nav-links a:hover::after{width:100%}
.nav-links a:hover{color:var(--gold)}
.mobile-toggle{
  display:none;background:none;border:none;cursor:pointer;padding:10px;
}
.mobile-toggle span{
  display:block;width:25px;height:2px;background:var(--white);
  margin:6px 0;transition:0.3s;
}

/* HERO */
.hero{
  position:relative;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.hero-video{
  position:absolute;top:0;left:0;width:100%;height:100%;
  object-fit:cover;z-index:0;
}
.hero-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(135deg,rgba(0,26,51,0.88) 0%,rgba(0,51,102,0.75) 50%,rgba(0,26,51,0.9) 100%);
  z-index:1;
}
.hero-content{
  position:relative;z-index:2;text-align:center;
  padding:120px 40px 80px;max-width:900px;
}

/* HERITAGE SHIELD */
.shield-wrapper{
  perspective:800px;margin-bottom:40px;
}
.heritage-shield{
  display:inline-block;width:120px;height:140px;
  position:relative;transform-style:preserve-3d;
  animation:shieldRotate 8s ease-in-out infinite;
}
@keyframes shieldRotate{
  0%,100%{transform:rotateY(0deg) rotateX(0deg)}
  25%{transform:rotateY(15deg) rotateX(5deg)}
  50%{transform:rotateY(0deg) rotateX(0deg)}
  75%{transform:rotateY(-15deg) rotateX(-5deg)}
}
.heritage-shield svg{width:100%;height:100%}

.hero-subtitle{
  font-size:13px;color:var(--gold);letter-spacing:5px;
  text-transform:uppercase;margin-bottom:20px;
  font-family:'Lato',sans-serif;font-weight:600;
}
.hero-title{
  font-size:clamp(36px,6vw,64px);color:var(--white);
  margin-bottom:20px;line-height:1.1;
}
.hero-title em{color:var(--gold);font-style:italic}
.hero-desc{
  font-size:18px;color:rgba(255,255,255,0.75);
  margin-bottom:40px;font-weight:300;letter-spacing:0.5px;
}
.hero-btn{
  display:inline-block;padding:16px 50px;
  border:2px solid var(--gold);color:var(--gold);
  font-size:12px;letter-spacing:3px;text-transform:uppercase;
  transition:all 0.4s;font-weight:700;
}
.hero-btn:hover{background:var(--gold);color:var(--navy)}

/* SCROLL INDICATOR */
.scroll-indicator{
  position:absolute;bottom:40px;left:50%;transform:translateX(-50%);z-index:3;
}
.scroll-arrow{
  width:24px;height:40px;border:2px solid rgba(255,255,255,0.5);
  border-radius:12px;position:relative;
}
.scroll-arrow::before{
  content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);
  width:4px;height:8px;background:var(--white);border-radius:2px;
  animation:scrollBounce 2s infinite;
}
@keyframes scrollBounce{
  0%,100%{transform:translateX(-50%) translateY(0);opacity:1}
  50%{transform:translateX(-50%) translateY(8px);opacity:0.5}
}
</style>
</head>
<body>
<!-- NAVIGATION -->
<nav class="nav" id="nav">
  <div class="nav-inner">
    <div class="nav-logo">Berkshire Hathaway<span>HomeServices</span></div>
    <ul class="nav-links">
      <li><a href="#legacy">Legacy</a></li>
      <li><a href="#properties">Properties</a></li>
      <li><a href="#services">Services</a></li>
      <li><a href="#testimonials">Testimonials</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
    <button class="mobile-toggle" id="mobileToggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- HERO -->
<section class="hero" id="hero">
  <video class="hero-video" autoplay muted loop playsinline>
    <source src="https://assets.mixkit.co/videos/34015/34015-360.mp4" type="video/mp4">
  </video>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="shield-wrapper">
      <div class="heritage-shield">
        <svg viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M60 5 L110 25 L110 75 Q110 110 60 135 Q10 110 10 75 L10 25 Z" stroke="#B8860B" stroke-width="2.5" fill="rgba(184,134,11,0.1)"/>
          <path d="M60 15 L100 32 L100 73 Q100 103 60 125 Q20 103 20 73 L20 32 Z" stroke="#B8860B" stroke-width="1" fill="none"/>
          <text x="60" y="55" text-anchor="middle" fill="#B8860B" font-family="Playfair Display,serif" font-size="11" font-weight="700">EST.</text>
          <text x="60" y="78" text-anchor="middle" fill="#B8860B" font-family="Playfair Display,serif" font-size="22" font-weight="700">1773</text>
          <line x1="35" y1="90" x2="85" y2="90" stroke="#B8860B" stroke-width="1"/>
          <text x="60" y="108" text-anchor="middle" fill="#B8860B" font-family="Lato,sans-serif" font-size="7" letter-spacing="3">HERITAGE</text>
        </svg>
      </div>
    </div>
    <div class="hero-subtitle">Since 1998 — A Legacy of Excellence</div>
    <h1 class="hero-title">Berkshire Hathaway<br><em>HomeServices</em></h1>
    <p class="hero-desc">One of the most trusted names in real estate, delivering unparalleled service and integrity across the nation.</p>
    <a href="#properties" class="hero-btn">Explore Properties</a>
  </div>
  <div class="scroll-indicator"><div class="scroll-arrow"></div></div>
</section>
